        resValue "bool", "ExoYoutubeCaching", "true"
        resValue "bool", "ExoURLCaching", "true"

        resValue "bool", "OemLegacyPlayer", "false"

        resValue "integer", "IjkColorFormatsID", "2"

        resValue "integer", "ResolutionID", "6"
