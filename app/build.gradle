plugins {
    id 'com.android.application'
}

def isAssembleModule(String flavor, String buildType) {
    def taskNames = gradle.startParameter.taskNames
    def targetTask = 'assemble' + flavor + buildType

    return taskNames.any { task ->
        task.contains(targetTask) &&
                (task.contains(project.name) || task == targetTask)
    }
}

def allTasksForFlavor(String flavor) {
    return isAssembleModule(flavor, "Debug") || isAssembleModule(flavor, "Release")
}

