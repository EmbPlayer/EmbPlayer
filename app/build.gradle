dependencies {
    // includes jars and aars in libs
    implementation fileTree(dir: 'libs/', include: ['*.aar', '*.jar'], exclude: [])
    // includes jars and aars in libs/jetty and all subfolders
    implementation fileTree(dir: 'libs/jetty', include: ['**/*.jar', '**/*.aar'])

/** MediaPlayer engines **/

    // includes jars and aars in libs/ijkplayer/libsLegacy
    implementation fileTree(dir: 'libs/ijkplayer/libsLegacy', include: ['*.aar', '*.jar'], exclude: [])

    if(allTasksForFlavor("M21"))
    {
        implementation("com.github.teamnewpipe:newpipeextractor:v0.26.3")
        implementation fileTree(dir: 'libs/ijkplayer/libsLegacy/arm64', include: ['*.aar', '*.jar'], exclude: [])
    }
    else if(allTasksForFlavor("M21V"))
    {
        implementation("com.github.teamnewpipe:newpipeextractor:v0.26.3")
        implementation fileTree(dir: 'libs/ijkplayer/libsLegacy/arm64', include: ['*.aar', '*.jar'], exclude: [])
        vlc = true;
    }
    else if(allTasksForFlavor("L16V"))
    {
        implementation 'com.github.SkyTubeTeam:NewPipeExtractor:skytube-2026-05-24'
        vlc = true;
    }
    else if(allTasksForFlavor("L16")){
        implementation 'com.github.SkyTubeTeam:NewPipeExtractor:skytube-2026-05-24'
    }
    else if(allTasksForFlavor("L14"))
    {

        implementation 'com.github.SkyTubeTeam:NewPipeExtractor:skytube-2026-05-24'
        exo = false
    }
    else{
        vlc = true
        implementation("com.github.teamnewpipe:newpipeextractor:v0.26.3")
    }

    if(exo)
    {
        implementation project(':media-lib-exoplayer')
        implementation project(':media-lib-exoplayer-dash')
        implementation project(':media-lib-exoplayer-hls')
        implementation project(':media-lib-exoplayer-smoothstreaming')
        implementation project(':media-lib-exoplayer-rtsp')
    }

    if(vlc)
    {
        implementation 'org.videolan.android:libvlc-all:3.6.5'
    }

