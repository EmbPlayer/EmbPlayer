            resValue "integer", "ResolutionIDLive", "5"

            resValue "integer", "RadioMediaEngineID", "1"
            resValue "integer", "LiveMediaEngineID", "1"
            resValue "integer", "URLMediaEngineID", "2"

            resValue "integer", "YoutubeAudioEngineID", "1"
            resValue "integer", "YoutubeVideoEngineID", "2"
        }

        l14 {
            initWith extra
            targetSdkVersion 15
            minSdkVersion 14
            resValue "bool", "EXO", "false"

            resValue "bool", "OemLegacyPlayer", "true"

            resValue "integer", "ResolutionID", "3"
            resValue "integer", "ResolutionIDLive", "3"

            resValue "integer", "RadioMediaEngineID", "1"
            resValue "integer", "LiveMediaEngineID", "1"
            resValue "integer", "URLMediaEngineID", "1"

            resValue "integer", "YoutubeAudioEngineID", "1"
            resValue "integer", "YoutubeVideoEngineID", "1"
        }
    }
    // Generate APK filenames as follows:  <App Name>-<Flavor><Version>
    applicationVariants.all { variant ->
        outputs.all { output ->
            outputFileName = "${parent.name}-${productFlavors[0].name.capitalize()}-${versionName}.apk"
        }
    }
    // Ignore missing translations
    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8

        coreLibraryDesugaringEnabled true
    }
    packagingOptions {
        exclude "/META-INF/**"
    }
    buildFeatures {
        viewBinding true
    }
    lint {
        abortOnError false
        checkReleaseBuilds false
    }
